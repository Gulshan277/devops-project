version: '3.8'

services:

  apache:
    build: ./frontend-apache
    container_name: apache
    ports:
      - "8081:80"

  backend:
    build: ./backend-java
    container_name: backend
    ports:
      - "8080:8080"

  mysql:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/init.sql

  haproxy:
    build: ./haproxy
    ports:
      - "80:80"
    depends_on:
      - apache
      - backend
